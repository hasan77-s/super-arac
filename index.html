<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Araç Gelir-Gider Takibi</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 400px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        #sonuc { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚗 Araç Takip Sistemi</h2>
    <label>Günlük Gelir:</label>
    <input type="number" id="gelir" placeholder="Geliri girin">
    
    <label>Günlük Gider:</label>
    <input type="number" id="gider" placeholder="Gideri girin">
    
    <button onclick="hesapla()">Hesapla</button>

    <div id="sonuc"></div>
</div>

<script>
    function hesapla() {
        // C'deki scanf mantığı: Değerleri alıyoruz
        let gelir = document.getElementById('gelir').value;
        let gider = document.getElementById('gider').value;
        
        // Hesaplama yapıyoruz
        let kar = gelir - gider;
        
        // C'deki printf mantığı: Ekrana yazdırıyoruz
        let sonucDiv = document.getElementById('sonuc');
        if (kar > 0) {
            sonucDiv.innerHTML = "Toplam Kar: " + kar + " TL ✅";
            sonucDiv.style.color = "green";
        } else {
            sonucDiv.innerHTML = "Zarar: " + kar + " TL ❌";
            sonucDiv.style.color = "red";
        }
    }
</script>

</body>
</html>
